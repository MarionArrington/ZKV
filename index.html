<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hradná pracovňa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="workspace-container">
        <!-- Hlavný obrázok pracovne -->
        <img src="https://i.ibb.co/tT4pQm75/pracovna.png" alt="Pracovňa" class="main-image">

        <!-- Interaktívne oblasti pre predmety -->
        <div class="hotspot pergamen" onclick="showText('pergamen')" title="Pergamen"></div>
        <div class="hotspot fotografia" onclick="showText('fotografia')" title="Fotografia"></div>
        <div class="hotspot sova" onclick="showText('sova')" title="Sova"></div>

        <!-- Interaktívna oblasť pre kvety vľavo dole -->
        <div class="hotspot-flowers" title="Kytica kvetov"></div>

        <!-- Animované elementy -->
        <div class="steam"></div>
        <div class="flame-glow"></div>

        <!-- Modálne okno (starý pergamen) s tmavým pozadím -->
        <div id="modal-backdrop" class="modal-backdrop" onclick="closeText(event)">
            <div class="scroll-modal" onclick="event.stopPropagation()">
                <button class="close-btn" onclick="closeTextDirect()">&times;</button>
                <div id="text-content"></div>
            </div>
        </div>
    </div>
<script>
// Tieto texty musia byt definovane, aby skript fungoval!
const texts = {
    pergamen: "Tento stredný pergamen na stole obsahuje tajné pokyny pre nadchádzajúce vyučovanie obrany proti čiernej mágii. Očakáva sa tvoja účasť o polnoci.",
    fotografia: "Fotografia v zlatom ráme zachraňuje čarovné chvíle strávené v slnečných záhradách pri starom hrade.",
    sova: "Vierna hrana sova pozorne stráži miestnosť a trpezlivo čaká, kým jej pripne na nohu dôležitý odkaz pre adresáta."
};

function showText(target) {
    const backdrop = document.getElementById('modal-backdrop');
    const textContent = document.getElementById('text-content');

    if (texts[target]) {
        textContent.innerHTML = texts[target];
        backdrop.classList.add('active');
    }
}

// Zatvorenie kliknutím mimo okna
document.getElementById('modal-backdrop').addEventListener('click', function(event) {
    const backdrop = document.getElementById('modal-backdrop');
    if (event.target === backdrop) {
        backdrop.classList.remove('active');
    }
});

// Zatvorenie cez krížik pomocou funkcie closeText()
function closeText() {
    const backdrop = document.getElementById('modal-backdrop');
    backdrop.classList.remove('active');
}
</script>
</body>
</html>
