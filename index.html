<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hradná pracovňa</title>
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Georgia', serif;
        }

        .workspace-container {
            position: relative;
            max-width: 1000px;
            width: 100%;
        }

        .main-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        /* Klikacie oblasti (hotspoty) */
        .hotspot {
            position: absolute;
            cursor: pointer;
            z-index: 5;
        }

        .hotspot.pergamen {
            top: 62%;
            left: 39%;
            width: 26%;
            height: 26%;
        }

        .hotspot.fotografia {
            top: 35%;
            left: 70%;
            width: 28%;
            height: 20%;
        }

        .hotspot.sova {
            top: 9%;
            left: 72%;
            width: 12%;
            height: 28%;
        }

        /* --- ANIMOVANÉ PRVKY --- */

        /* Sviečka (žiara) */
        .flame-glow {
            position: absolute;
            top: 53%;
            left: 65%;
            width: 55px;
            height: 55px;
            background: radial-gradient(circle, rgba(255,240,150,0.95) 0%, rgba(255,120,0,0.7) 50%, rgba(255,60,0,0.2) 80%, transparent 100%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 4;
            mix-blend-mode: screen;
            animation: strongFlicker 1s infinite alternate ease-in-out;
        }

        @keyframes strongFlicker {
            0% { transform: scale(0.8); opacity: 0.7; }
            50% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.85; }
        }

        /* Extra výrazná a veľká para nad šálkou */
        .steam-container {
            position: absolute;
            top: 45%;
            left: 6%;
            width: 60px;
            height: 130px;
            pointer-events: none;
            z-index: 4;
            filter: blur(6px);
        }

        .steam-particle {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 55px;
            height: 55px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            animation: riseRealisticSteam 1.8s infinite linear;
        }

        .steam-particle:nth-child(2) {
            animation-delay: 0.9s;
            width: 45px;
            height: 45px;
            left: 12px;
        }

        @keyframes riseRealisticSteam {
            0% {
                transform: translateY(0) scale(0.5);
                opacity: 0;
            }
            25% {
                opacity: 0.95;
            }
            100% {
                transform: translateY(-110px) scale(2.6) skewX(15deg);
                opacity: 0;
            }
        }

        /* Záves */
        .curtain-anim {
            position: absolute;
            top: 2%;
            left: 26.5%;
            width: 8%;
            height: 42%;
            pointer-events: none;
            z-index: 4;
            transform-origin: top left;
            background: linear-gradient(90deg, rgba(255,255,255,0.15), transparent);
            animation: swayCurtain 3.5s infinite ease-in-out;
        }

        @keyframes swayCurtain {
            0%, 100% { transform: rotate(0deg) skewX(0deg); }
            50% { transform: rotate(4deg) skewX(4deg); }
        }


        /* --- MODÁLNE OKNO --- */
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.35s ease, visibility 0.35s ease;
            z-index: 100;
        }

        .modal-backdrop.active {
            visibility: visible;
            opacity: 1;
        }

        .scroll-container {
            position: relative;
            width: 75%;
            max-width: 650px;
        }

        .scroll-image {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.8));
        }

        .scroll-text-content {
            position: absolute;
            top: 18%;
            left: 15%;
            width: 70%;
            height: 64%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #2b1705;
            font-family: 'Georgia', serif;
            overflow-y: auto;
            padding: 10px;
        }

        .scroll-text-content h2 {
            margin-top: 0;
            color: #4a270b;
            font-size: 1.4rem;
            border-bottom: 2px solid #b8915c;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        /* Štýl pre profil praktikantky */
        .profile-title {
            font-size: 1.4rem;
            font-weight: bold;
            color: #4a270b;
            margin: 0 0 5px 0;
        }

        .profile-subtitle {
            font-size: 1rem;
            font-style: italic;
            color: #5c3a21;
            margin: 0 0 25px 0;
        }

        .profile-text {
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0;
        }

        /* Štýl pre kontakty na pergamene sovy */
        .contacts-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            align-items: flex-start;
            padding-left: 15px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            color: #2b1705;
        }

        .contact-icon {
            width: 30px;
            height: 30px;
            object-fit: contain;
            border-radius: 50%;
        }

        .close-btn {
            position: absolute;
            top: 8%;
            right: 12%;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #5c3a21;
            z-index: 10;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #000;
        }
    </style>
</head>
<body>

    <div class="workspace-container">
        <!-- Hlavný obrázok pracovne -->
        <img src="https://i.ibb.co/tT4pQm75/pracovna.png" alt="Pracovňa" class="main-image">

        <!-- Animované prvky -->
        <div class="flame-glow"></div>
        
        <!-- Veľká a výrazná stúpajúca para -->
        <div class="steam-container">
            <div class="steam-particle"></div>
            <div class="steam-particle"></div>
        </div>

        <div class="curtain-anim"></div>

        <!-- Interaktívne oblasti pre predmety -->
        <div class="hotspot pergamen" onclick="showText('pergamen')" title="Pergamen"></div>
        <div class="hotspot fotografia" onclick="showText('fotografia')" title="Fotografia"></div>
        <div class="hotspot sova" onclick="showText('sova')" title="Sova"></div>

        <!-- Modálne okno s pergamendom -->
        <div id="modal-backdrop" class="modal-backdrop">
            <div class="scroll-container" onclick="event.stopPropagation()">
                <button class="close-btn" onclick="closeText()">&times;</button>
                <img src="https://i.ibb.co/7xYQz5dq/111ab02f-6b6b-4909-bda8-4ce4549fafc9-removebg-preview.png" alt="Pergamen" class="scroll-image">
                <div id="text-content" class="scroll-text-content"></div>
            </div>
        </div>
    </div>

<script>
const texts = {
    pergamen: "<h2>Dôležitý list</h2><p>Tento stredný pergamen na stole obsahuje tajné pokyny pre nadchádzajúce vyučovanie obrany proti čiernej mágii. Očakáva sa tvoja účasť o polnoci.</p>",
    fotografia: `<h2 class="profile-title">Marion G. Arrington</h2>
                 <p class="profile-subtitle">praktikantka</p>
                 <p class="profile-text">Som profesionálna tanečnica, no od začiatku tohto roka pôsobím v Bradaviciach na pozícií praktikantky. Mojim hlavným zameraním sú Lektvary, Obrana proti čiernej mágií a Kúzelnícke liečiteľstvo. Spoločne sa budeme stretávať na hodinách ZKV, ktorých absolvovanie je, nariadením Ministerstva mágie, povinným pre všetkých študentov školy.</p>`,
    sova: `<h2>Kontakty</h2>
           <div class="contacts-list">
               <div class="contact-item">
                   <img src="https://i.ibb.co/GfNHdQt8/1.png" alt="Email" class="contact-icon">
                   <span>i.arden@revelio.cz</span>
               </div>
               <div class="contact-item">
                   <img src="https://i.ibb.co/5WyLF5X8/2.png" alt="Discord" class="contact-icon">
                   <span>isabellearden</span>
               </div>
               <div class="contact-item">
                   <img src="https://i.ibb.co/5WyLF5X8/2.png" alt="Discord" class="contact-icon">
                   <span>Ardenkin pavilón šeliem</span>
               </div>
           </div>`
};

function showText(target) {
    const backdrop = document.getElementById('modal-backdrop');
    const textContent = document.getElementById('text-content');

    if (texts[target]) {
        textContent.innerHTML = texts[target];
        backdrop.classList.add('active');
    }
}

document.getElementById('modal-backdrop').addEventListener('click', function(event) {
    const backdrop = document.getElementById('modal-backdrop');
    if (event.target === backdrop) {
        backdrop.classList.remove('active');
    }
});

function closeText() {
    const backdrop = document.getElementById('modal-backdrop');
    backdrop.classList.remove('active');
}
</script>
</body>
</html>
