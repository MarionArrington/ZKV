<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hradná pracovňa</title>
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Georgia', serif;
        }

        .workspace-container {
            position: relative;
            max-width: 1000px;
            width: 100%;
        }

        .main-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        /* Klikacie oblasti (hotspoty) */
        .hotspot {
            position: absolute;
            cursor: pointer;
            z-index: 5;
        }

        .hotspot.pergamen {
            top: 62%;
            left: 39%;
            width: 26%;
            height: 26%;
        }

        .hotspot.fotografia {
            top: 35%;
            left: 70%;
            width: 28%;
            height: 20%;
        }

        .hotspot.sova {
            top: 9%;
            left: 72%;
            width: 12%;
            height: 28%;
        }

        /* --- OPRAVENÉ ANIMOVANÉ PRVKY --- */

        /* 1. Plameň sviečky - Zmeňte top/left podľa toho, kde je sviečka */
        .flame-glow {
            position: absolute;
            top: 45%; 
            left: 48%; 
            width: 35px;
            height: 35px;
            background: radial-gradient(circle, rgba(255,200,50,0.9) 0%, rgba(255,100,0,0.5) 50%, transparent 80%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 4;
            animation: flicker 1.2s infinite alternate ease-in-out;
        }

        @keyframes flicker {
            0% { transform: scale(0.85); opacity: 0.6; }
            50% { transform: scale(1.25); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }

        /* 2. Para zo šálky - Zmeňte top/left podľa toho, kde je šálka */
        .steam {
            position: absolute;
            top: 72%; 
            left: 20%; 
            width: 25px;
            height: 50px;
            background: linear-gradient(to top, rgba(255,255,255,0.6), transparent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 4;
            filter: blur(3px);
            animation: riseSteam 2.5s infinite linear;
        }

        @keyframes riseSteam {
            0% { transform: translateY(0) scaleX(0.7); opacity: 0; }
            40% { opacity: 0.7; }
            100% { transform: translateY(-50px) scaleX(1.5); opacity: 0; }
        }

        /* 3. Pohyb závesu - Zmeňte top/left/width/height podľa toho, kde je okno/záves */
        .curtain-anim {
            position: absolute;
            top: 10%; 
            left: 10%; 
            width: 15%;
            height: 35%;
            pointer-events: none;
            z-index: 4;
            transform-origin: top center;
            animation: swayCurtain 4s infinite ease-in-out;
            background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent);
        }

        @keyframes swayCurtain {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(4deg) skewX(3deg); }
        }


        /* --- MODÁLNE OKNO --- */
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.35s ease, visibility 0.35s ease;
            z-index: 100;
        }

        .modal-backdrop.active {
            visibility: visible;
            opacity: 1;
        }

        .scroll-container {
            position: relative;
            width: 75%;
            max-width: 650px;
        }

        .scroll-image {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.8));
        }

        .scroll-text-content {
            position: absolute;
            top: 18%;
            left: 15%;
            width: 70%;
            height: 64%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #2b1705;
            font-family: 'Georgia', serif;
            overflow-y: auto;
            padding: 10px;
        }

        .scroll-text-content h2 {
            margin-top: 0;
            color: #4a270b;
            font-size: 1.4rem;
            border-bottom: 2px solid #b8915c;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        .scroll-text-content p {
            font-size: 1rem;
            line-height: 1.5;
            margin: 0;
        }

        .close-btn {
            position: absolute;
            top: 8%;
            right: 12%;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #5c3a21;
            z-index: 10;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #000;
        }
    </style>
</head>
<body>

    <div class="workspace-container">
        <!-- Hlavný obrázok pracovne -->
        <img src="https://i.ibb.co/tT4pQm75/pracovna.png" alt="Pracovňa" class="main-image">

        <!-- Animované prvky -->
        <div class="flame-glow"></div>
        <div class="steam"></div>
        <div class="curtain-anim"></div>

        <!-- Interaktívne oblasti pre predmety -->
        <div class="hotspot pergamen" onclick="showText('pergamen')" title="Pergamen"></div>
        <div class="hotspot fotografia" onclick="showText('fotografia')" title="Fotografia"></div>
        <div class="hotspot sova" onclick="showText('sova')" title="Sova"></div>

        <!-- Modálne okno s pergamendom -->
        <div id="modal-backdrop" class="modal-backdrop">
            <div class="scroll-container" onclick="event.stopPropagation()">
                <button class="close-btn" onclick="closeText()">&times;</button>
                <img src="https://i.ibb.co/7xYQz5dq/111ab02f-6b6b-4909-bda8-4ce4549fafc9-removebg-preview.png" alt="Pergamen" class="scroll-image">
                <div id="text-content" class="scroll-text-content"></div>
            </div>
        </div>
    </div>

<script>
const texts = {
    pergamen: "<h2>Dôležitý list</h2><p>Tento stredný pergamen na stole obsahuje tajné pokyny pre nadchádzajúce vyučovanie obrany proti čiernej mágii. Očakáva sa tvoja účasť o polnoci.</p>",
    fotografia: "<h2>Vzácna spomienka</h2><p>Fotografia v zlatom ráme zachraňuje čarovné chvíle strávené v slnečných záhradách pri starom hrade.</p>",
    sova: "<h2>Biela sova</h2><p>Vierna hrana sova pozorne stráži miestnosť a trpezlivo čaká, kým jej pripne na nohu dôležitý odkaz pre adresáta.</p>"
};

function showText(target) {
    const backdrop = document.getElementById('modal-backdrop');
    const textContent = document.getElementById('text-content');

    if (texts[target]) {
        textContent.innerHTML = texts[target];
        backdrop.classList.add('active');
    }
}

document.getElementById('modal-backdrop').addEventListener('click', function(event) {
    const backdrop = document.getElementById('modal-backdrop');
    if (event.target === backdrop) {
        backdrop.classList.remove('active');
    }
});

function closeText() {
    const backdrop = document.getElementById('modal-backdrop');
    backdrop.classList.remove('active');
}
</script>
</body>
</html>
