<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hradná pracovňa</title>
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Georgia', serif;
            overflow: hidden; /* Skrytie pretŕčania pri parallaexe */
        }

        .workspace-container {
            position: relative;
            max-width: 1000px;
            width: 100%;
            /* Parallax transformácia, ktorá sa bude dynamicky meniť cez JS */
            transform: translate(0px, 0px);
            transition: transform 0.1s ease-out;
            will-change: transform;
        }

        .main-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        /* Plynulé žmurknutie kombinujúce opacity a jemné zmenšenie výšky viečok pre realistický efekt */
        .owl-blink-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.ibb.co/vCyCDWsR/zatvoren-o-i.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            pointer-events: none;
            z-index: 2;
            opacity: 0;
            transform: scaleY(0.95);
            transform-origin: top center;
            animation: naturalBlink 6s infinite ease-in-out;
        }

        @keyframes naturalBlink {
            0%, 84%, 100% { 
                opacity: 0; 
                transform: scaleY(0.9);
            }
            87%, 91% { 
                opacity: 1; /* Jemný prechod bez prudkého sekania */
                transform: scaleY(1);
            }
        }

        /* Klikacie oblasti (hotspoty) */
        .hotspot {
            position: absolute;
            cursor: pointer;
            z-index: 5;
        }

        .hotspot.pergamen {
            top: 62%;
            left: 39%;
            width: 26%;
            height: 26%;
        }

        .hotspot.fotografia {
            top: 35%;
            left: 70%;
            width: 28%;
            height: 20%;
        }

        .hotspot.sova {
            top: 9%;
            left: 72%;
            width: 12%;
            height: 28%;
        }

        /* --- ANIMOVANÉ PRVKY --- */

        .flame-glow {
            position: absolute;
            top: 53%;
            left: 65%;
            width: 55px;
            height: 55px;
            background: radial-gradient(circle, rgba(255,240,150,0.95) 0%, rgba(255,120,0,0.7) 50%, rgba(255,60,0,0.2) 80%, transparent 100%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 4;
            mix-blend-mode: screen;
            animation: strongFlicker 1s infinite alternate ease-in-out;
        }

        @keyframes strongFlicker {
            0% { transform: scale(0.8); opacity: 0.7; }
            50% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.85; }
        }

        /* Vylepšená para: jemnejší štart/koniec, vlnenie v osi X a jemnejšia rotácia namiesto ostrého skewX */
        .steam-container {
            position: absolute;
            top: 45%;
            left: 6%;
            width: 60px;
            height: 130px;
            pointer-events: none;
            z-index: 4;
            filter: blur(6px);
        }

        .steam-particle {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 55px;
            height: 55px;
            background: rgba(255, 255, 255, 0.75); /* Jemnejšia počiatočná krytie */
            border-radius: 50%;
            animation: riseNaturalSteam 2.2s infinite linear;
        }

        .steam-particle:nth-child(2) {
            animation-delay: 1.1s;
            width: 45px;
            height: 45px;
            left: 10px;
        }

        @keyframes riseNaturalSteam {
            0% {
                transform: translate(0, 0) scale(0.4);
                opacity: 0;
            }
            20% {
                opacity: 0.7; /* Nižší a jemnejší vrchol opacity, aby "nedupala" */
            }
            100% {
                transform: translate(15px, -110px) scale(2.2) rotate(8deg); /* Vlnenie v osi X a jemná rotácia */
                opacity: 0;
            }
        }

        /* Záves s pridaným "bounce" efektom na konci chvenia */
        .curtain-anim {
            position: absolute;
            top: 2%;
            left: 26.5%;
            width: 8%;
            height: 42%;
            pointer-events: none;
            z-index: 4;
            transform-origin: top left;
            background: linear-gradient(90deg, rgba(255,255,255,0.15), transparent);
            animation: swayCurtainWithBounce 4s infinite ease-in-out;
        }

        @keyframes swayCurtainWithBounce {
            0%, 100% { transform: rotate(0deg) skewX(0deg); }
            40% { transform: rotate(5deg) skewX(3deg); }
            55% { transform: rotate(3deg) skewX(1deg); } /* Bounce / dozvuk chvenia */
            70% { transform: rotate(4.5deg) skewX(2deg); }
        }


        /* --- MODÁLNE OKNO (Rozvíjanie a zvinovanie pergamenu) --- */
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.35s ease, visibility 0.35s ease;
            z-index: 100;
        }

        .modal-backdrop.active {
            visibility: visible;
            opacity: 1;
        }

        .scroll-container {
            position: relative;
            width: 90%;
            max-width: 850px;
            transform: scaleY(0); /* Začína zvinutý na nulu (čiara) */
            transform-origin: center center;
            opacity: 0;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease;
        }

        .modal-backdrop.active .scroll-container {
            transform: scaleY(1); /* Pomalé rozvinutie zhora nadol */
            opacity: 1;
        }

        .scroll-image {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.8));
        }

        .scroll-text-content {
            position: absolute;
            top: 15%;
            left: 10%;
            width: 80%;
            height: 70%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #2b1705;
            font-family: 'Georgia', serif;
            overflow-y: auto;
            padding: 10px;
            opacity: 0;
            transition: opacity 0.3s ease 0.25s; /* Text sa objaví až po rozvinutí pergamenu */
        }

        .modal-backdrop.active .scroll-text-content {
            opacity: 1;
        }

        .scroll-text-content h2 {
            margin-top: 0;
            color: #4a270b;
            font-size: 1.4rem;
            border-bottom: 2px solid #b8915c;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        /* Profil praktikantky */
        .profile-layout {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 25px;
            width: 100%;
            text-align: left;
        }

        .profile-text-side {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .profile-title {
            font-size: 1.45rem;
            font-weight: bold;
            color: #4a270b;
            margin: 0 0 4px 0;
        }

        .profile-subtitle {
            font-size: 1.05rem;
            font-style: italic;
            color: #5c3a21;
            margin: 0 0 20px 0;
        }

        .profile-text {
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0;
        }

        .profile-photos-side {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: flex-end;
            position: relative;
            min-width: 190px;
        }

        .photo-main {
            width: 155px;
            height: 190px;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 6px 20px rgba(0,0,0,0.35);
            z-index: 2;
        }

        .photo-secondary {
            width: 115px;
            height: 115px;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 6px 20px rgba(0,0,0,0.35);
            position: absolute;
            top: 105px;
            right: 105px;
            z-index: 3;
        }

        /* Kontakty */
        .contacts-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            gap: 10px;
        }

        .contacts-intro {
            font-size: 0.95rem;
            font-style: italic;
            color: #5c3a21;
            margin-bottom: 5px;
            text-align: center;
        }

        .contacts-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 400px;
            align-items: flex-start;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            color: #2b1705;
        }

        .contact-icon {
            width: 26px;
            height: 26px;
            object-fit: contain;
            border-radius: 50%;
        }

        /* Vylepšené, väčšie a pohodlnejšie zatváracie tlačidlo */
        .close-btn {
            position: absolute;
            top: 6%;
            right: 10%;
            background: rgba(92, 58, 33, 0.15);
            border: 2px solid #5c3a21;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            line-height: 1;
            cursor: pointer;
            color: #4a270b;
            z-index: 10;
            transition: all 0.2s ease;
        }

        .close-btn:hover {
            background: #5c3a21;
            color: #fff;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="workspace-container" id="workspaceContainer">
        <!-- Hlavný obrázok pracovne (podklad) -->
        <img src="https://i.ibb.co/tT4pQm75/pracovna.png" alt="Pracovňa" class="main-image">

        <!-- Vrstva so zatvorenými očami s plynulým prirodzeným žmurkaním -->
        <div class="owl-blink-layer"></div>

        <!-- Animované prvky -->
        <div class="flame-glow"></div>
        
        <div class="steam-container">
            <div class="steam-particle"></div>
            <div class="steam-particle"></div>
        </div>

        <div class="curtain-anim"></div>

        <!-- Interaktívne oblasti pre predmety -->
        <div class="hotspot pergamen" onclick="showText('pergamen')" title="Pergamen"></div>
        <div class="hotspot fotografia" onclick="showText('fotografia')" title="Fotografia"></div>
        <div class="hotspot sova" onclick="showText('sova')" title="Sova"></div>

        <!-- Modálne okno s pergamendom (zatvorenie kliknutím mimo zapracované) -->
        <div id="modal-backdrop" class="modal-backdrop" onclick="closeText()">
            <div class="scroll-container" onclick="event.stopPropagation()">
                <button class="close-btn" onclick="closeText()">&times;</button>
                <img src="https://i.ibb.co/7xYQz5dq/111ab02f-6b6b-4909-bda8-4ce4549fafc9-removebg-preview.png" alt="Pergamen" class="scroll-image">
                <div id="text-content" class="scroll-text-content"></div>
            </div>
        </div>
    </div>

<script>
const texts = {
    pergamen: "<h2>Dôležitý list</h2><p>Tento stredný pergamen na stole obsahuje tajné pokyny pre nadchádzajúce vyučovanie obrany proti čiernej mágii. Očakáva sa tvoja účasť o polnoci.</p>",
    fotografia: `<div class="profile-layout">
                    <div class="profile-text-side">
                        <h2 class="profile-title">Marion G. Arrington</h2>
                        <p class="profile-subtitle">praktikantka</p>
                        <p class="profile-text">Som profesionálna tanečnica, no od začiatku tohto roka pôsobím v Bradaviciach na pozícií praktikantky. Mojim hlavným zameraním sú Lektvary, Obrana proti čiernej mágií a Kúzelnícke liečiteľstvo. Spoločne sa budeme stretávať na hodinách ZKV, ktorých absolvovanie je, nariadením Ministerstva mágie, povinným pre všetkých študentov školy.</p>
                    </div>
                    <div class="profile-photos-side">
                        <img src="https://i.ibb.co/HvYD9RR/740full-mariia-arsentieva.jpg" alt="Marion hlavná" class="photo-main">
                        <img src="https://i.ibb.co/nsF6x8Pj/ZABS4-Ath-400x400.jpg" alt="Marion portrét" class="photo-secondary">
                    </div>
                 </div>`,
    sova: `<h2>Sovička a odkazy</h2>
           <div class="contacts-wrapper">
               <p class="contacts-intro">Ak mi chceš niečo odkázať, pošli sovou list alebo ma zastihni tu:</p>
               <div class="contacts-list">
                   <div class="contact-item">
                       <img src="https://i.ibb.co/GfNHdQt8/1.png" alt="Email" class="contact-icon">
                       <span>i.arden@revelio.cz</span>
                   </div>
                   <div class="contact-item">
                       <img src="https://i.ibb.co/5WyLF5X8/2.png" alt="Discord" class="contact-icon">
                       <span>isabellearden</span>
                   </div>
                   <div class="contact-item">
                       <img src="https://i.ibb.co/5WyLF5X8/2.png" alt="Discord" class="contact-icon">
                       <span>Ardenkin pavilón šeliem</span>
                   </div>
               </div>
           </div>`
};

function showText(target) {
    const backdrop = document.getElementById('modal-backdrop');
    const textContent = document.getElementById('text-content');

    if (texts[target]) {
        textContent.innerHTML = texts[target];
        backdrop.classList.add('active');
    }
}

function closeText() {
    const backdrop = document.getElementById('modal-backdrop');
    backdrop.classList.remove('active');
}

/* Parallax efekt na základe pohybu myši */
document.addEventListener('mousemove', function(e) {
    const container = document.getElementById('workspaceContainer');
    const xAxis = (window.innerWidth / 2 - e.pageX) / 45; // Citlivosť pohybu osi X
    const yAxis = (window.innerHeight / 2 - e.pageY) / 45; // Citlivosť pohybu osi Y
    
    container.style.transform = `translate(${xAxis}px, ${yAxis}px)`;
});
</script>
</body>
</html>
